{% extends 'base.html' %}

{% block title %}Log In | FlavorFoundry Market{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="bg-white rounded-4 border p-4 p-sm-5 shadow-sm">
                <div class="text-center mb-4">
                    <div class="brand-logo justify-content-center mb-2">
                        <i class="bi bi-basket2-fill text-success fs-2"></i>
                    </div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted small">Log in to manage your grocery orders and saved profile</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" placeholder="Enter password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-green btn-lg w-100 rounded-pill fw-bold shadow-sm mb-3">Log In</button>
                </form>

                <div class="text-center pt-3 border-top small text-muted">
                    Don't have an account? <a href="{% url 'signup' %}" class="text-success fw-bold text-decoration-none">Sign Up Here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
