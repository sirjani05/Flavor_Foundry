services:
  - type: web
    name: flavorfoundry
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn flavorfoundry.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: flavorfoundry-db
          property: connectionString
databases:
  - name: flavorfoundry-db
    databaseName: flavorfoundry
    user: flavorfoundry
